# Default Alchemy pipeline configuration
# MLX remains the default here for compatibility, but on Apple Silicon with
# Unsloth GGUF models the preferred local path is llama.cpp + Metal.
# See configs/examples/apple_silicon_gguf.yaml.
planner_model:
  provider_type: mlx
  model_id: mlx-community/Qwen2.5-7B-Instruct-4bit

generator_model:
  provider_type: mlx
  model_id: mlx-community/Qwen2.5-7B-Instruct-4bit

validator_model:
  provider_type: mlx
  model_id: mlx-community/Qwen2.5-7B-Instruct-4bit

output_format: huggingface
output_path: ./output
num_samples: 100
batch_size: 10
min_quality_score: 0.7
