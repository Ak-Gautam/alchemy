# Example: Chemistry Q&A dataset
# Uses a strong API model for planning, local model for generation
# TODO update to latest Unsloth qwen 3.5 and GPT-5.4 models

planner_model:
  provider_type: openai
  model_id: gpt-4o
  options:
    temperature: 0.8

generator_model:
  provider_type: mlx
  model_id: mlx-community/Qwen2.5-14B-Instruct-4bit

validator_model:
  provider_type: openai
  model_id: gpt-4o-mini

output_format: huggingface
output_path: ./output/chemistry_qa
num_samples: 500
batch_size: 10
min_quality_score: 0.8
